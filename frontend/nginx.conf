server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
    location /query {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /thumb/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
