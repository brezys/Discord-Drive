services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CLIP_CACHE_DIR: /app/model_cache
      HF_HOME: /app/model_cache
      TORCH_HOME: /app/model_cache
    volumes:
      - thumb_data:/app/thumbs
      - image_data:/app/images
      - model_cache:/app/model_cache
    depends_on:
      - qdrant
    restart: unless-stopped

  bot:
    build:
      context: ./bot
    env_file:
      - ./bot/.env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  thumb_data:
  image_data:
  model_cache:
